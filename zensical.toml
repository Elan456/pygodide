[project]
site_name = "pygodide"
site_description = "Modern replacement for pygbag that leverages pyodide for running pygame in the web"
site_url = "https://elan456.github.io/pygodide/"
repo_url = "https://github.com/Elan456/pygodide"
repo_name = "Elan456/pygodide"
copyright = "MIT"
docs_dir = "docs"
site_dir = "site"
extra_css = ["styles/overrides.css"]
nav = [
  {"Home" = "index.md"},
  {"Instructions" = "instructions.md"},
  {"CLI reference" = "cli.md"},
  {"Benchmarks" = "benchmark.md"},
]

[project.theme]
features = [
  "navigation.tracking",
  "navigation.indexes",
  "content.code.copy",
  "toc.follow",
  "search.suggest",
  "search.highlight",
  "content.tooltips",
  "navigation.footer",
  "navigation.top",
]
font.text = "Inter"
font.code = "JetBrains Mono"

[project.theme.palette]
scheme = "slate"
primary = "indigo"
accent = "deep orange"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions."mkdocs_typer2.markdown:makeExtension"]
pretty = true
engine = "native"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Elan456/pygodide"
name = "GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/pygodide/"
name = "PyPI"
