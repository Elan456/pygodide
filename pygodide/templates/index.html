<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="icon" href="{{ favicon_path }}" type="{{ favicon_type }}" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        --pygodide-accent: #3dd018;
        --pygodide-accent-2: #e8c200;
        --pygodide-accent-3: #306998;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        background: #090c17;
        color: #edf3ff;
      }

      .pygodide-shell {
        width: max-content;
        max-width: 100vw;
        padding: 20px;
      }

      {% if canvas_auto %}
      .pygodide-shell {
        width: 100%;
        max-width: 100vw;
        height: 100vh;
        height: 100dvh;
        padding: 20px;
        box-sizing: border-box;
        display: grid;
        place-items: center;
      }
      {% endif %}

      /* Logo/status are positioned against the canvas box, not the padded shell. */
      .pygodide-stage {
        position: relative;
        width: max-content;
        max-width: calc(100vw - 40px);
      }

      {% if canvas_auto %}
      .pygodide-stage {
        width: 100%;
        height: 100%;
        max-width: none;
      }
      {% endif %}

      /* Centered loading chrome over the canvas. */
      #pygodide-loader {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8% 10% 12%;
        pointer-events: none;
        transition:
          opacity 180ms ease-out,
          visibility 180ms linear;
      }

      #pygodide-loader[data-state="hidden"] {
        opacity: 0;
        visibility: hidden;
      }

      #pygodide-brand {
        display: block;
        width: min(420px, 88%);
        height: auto;
        margin: 0 auto 1.35rem;
        /* Nudge logo up so status + bar sit under the visual center. */
        transform: translateY(-10%);
        opacity: 0.98;
        filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.45));
      }

      #{{ status_element_id }} {
        z-index: 4;
        width: min(420px, 92%);
        margin: 0 auto 0.85rem;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        color: rgba(237, 243, 255, 0.88);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.01em;
        line-height: 1.45;
        text-align: center;
        white-space: pre-wrap;
        overflow: hidden;
        transition: opacity 180ms ease-out, color 180ms ease;
      }

      #{{ status_element_id }}[data-state="hidden"],
      #{{ status_element_id }}:empty {
        opacity: 0;
      }

      #{{ status_element_id }}[data-state="error"] {
        color: #ffb4b4;
        max-height: min(40vh, 280px);
        overflow: auto;
        text-align: left;
        white-space: pre-wrap;
        padding: 12px 14px;
        border: 1px solid rgba(255, 132, 132, 0.35);
        border-radius: 10px;
        background: rgba(42, 12, 16, 0.92);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      }

      .pygodide-progress {
        position: relative;
        width: min(320px, 70%);
        height: 6px;
        margin: 0 auto;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(165, 187, 255, 0.12);
        box-shadow: inset 0 0 0 1px rgba(165, 187, 255, 0.12);
      }

      .pygodide-progress[data-state="hidden"] {
        opacity: 0;
      }

      .pygodide-progress[data-state="error"] {
        background: rgba(255, 120, 120, 0.15);
      }

      .pygodide-progress-fill {
        position: relative;
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        transform: scaleX(0.08);
        transform-origin: left center;
        overflow: hidden;
        background: linear-gradient(
          90deg,
          var(--pygodide-accent-3) 0%,
          var(--pygodide-accent) 48%,
          var(--pygodide-accent-2) 100%
        );
        box-shadow: 0 0 16px rgba(61, 208, 24, 0.35);
        transition: transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .pygodide-progress[data-state="error"] .pygodide-progress-fill {
        background: linear-gradient(90deg, #ff6b6b, #ffb4b4);
        box-shadow: 0 0 14px rgba(255, 107, 107, 0.35);
        transform: scaleX(1);
      }

      /* Soft shimmer over the fill while loading. */
      .pygodide-progress-fill::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 30%,
          rgba(255, 255, 255, 0.35) 48%,
          transparent 66%
        );
        transform: translateX(-120%);
        animation: pygodide-shimmer 1.6s ease-in-out infinite;
      }

      .pygodide-progress[data-state="error"] .pygodide-progress-fill::after,
      .pygodide-progress[data-state="hidden"] .pygodide-progress-fill::after {
        animation: none;
        opacity: 0;
      }

      @keyframes pygodide-shimmer {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(120%);
        }
      }

      #pygodide-version {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 4;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: rgba(237, 243, 255, 0.42);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1;
        pointer-events: none;
        user-select: none;
        transition:
          opacity 150ms ease-out,
          visibility 150ms linear;
      }

      #pygodide-version[data-state="hidden"] {
        opacity: 0;
        visibility: hidden;
      }

      #{{ canvas_element_id }} {
        display: block;
        border: 1px solid rgba(140, 160, 220, 0.14);
        background: #050814;
        {% if canvas_auto %}
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        {% else %}
        width: min({{ canvas_width }}px, 100%);
        max-width: 100%;
        height: auto;
        {% endif %}
      }
    </style>
  </head>
  <body>
    <main class="pygodide-shell">
      <div class="pygodide-stage">
        <div id="pygodide-loader" data-state="active" aria-live="polite">
          <img
            id="pygodide-brand"
            src="{{ logo_path }}"
            width="420"
            height="131"
            alt="pygodide"
          />
          <div id="{{ status_element_id }}" data-state="active">{{ status_text }}</div>
          <div
            id="pygodide-progress"
            class="pygodide-progress"
            data-state="active"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="8"
            aria-label="Loading progress"
          >
            <span id="pygodide-progress-fill" class="pygodide-progress-fill"></span>
          </div>
        </div>
        <p id="pygodide-version" data-state="active">pygodide {{ pygodide_version }}</p>
        <canvas
          id="{{ canvas_element_id }}"
          {% if canvas_auto %}
          data-canvas-auto="true"
          width="800"
          height="600"
          {% else %}
          width="{{ canvas_width }}"
          height="{{ canvas_height }}"
          {% endif %}
          tabindex="0"
        ></canvas>
      </div>
    </main>
    <script src="{{ pyodide_url }}"></script>
    {# Query string busts HTTP cache when boot.js content changes (Firefox keeps
       module scripts even when Storage is empty). #}
    <script type="module" src="{{ boot_script_path }}?v={{ boot_cache_buster }}"></script>
  </body>
</html>
