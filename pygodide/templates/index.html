<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="icon" href="{{ favicon_path }}" type="{{ favicon_type }}" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        background: #090c17;
        color: #edf3ff;
      }

      .pygodide-shell {
        width: max-content;
        max-width: 100vw;
        padding: 20px;
      }

      {% if canvas_auto %}
      .pygodide-shell {
        width: 100%;
        max-width: 100vw;
        height: 100vh;
        height: 100dvh;
        padding: 20px;
        box-sizing: border-box;
        display: grid;
        place-items: center;
      }
      {% endif %}

      /* Logo/status are positioned against the canvas box, not the padded shell. */
      .pygodide-stage {
        position: relative;
        width: max-content;
        max-width: calc(100vw - 40px);
      }

      {% if canvas_auto %}
      .pygodide-stage {
        width: 100%;
        height: 100%;
        max-width: none;
      }
      {% endif %}

      #pygodide-brand {
        position: absolute;
        inset: 0;
        z-index: 3;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        margin: auto;
        padding: 6%;
        object-fit: contain;
        object-position: center;
        opacity: 0.98;
        visibility: visible;
        pointer-events: none;
        transition:
          opacity 150ms ease-out,
          visibility 150ms linear;
        transform: none;
        filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.45));
      }

      #pygodide-brand[data-state="hidden"] {
        opacity: 0;
        visibility: hidden;
      }

      #{{ status_element_id }} {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 4;
        max-width: min(420px, calc(100% - 24px));
        padding: 10px 12px;
        border: 1px solid rgba(165, 187, 255, 0.22);
        /* Solid fill so the logo/canvas never show through the status text. */
        background: #0b101c;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
        font-size: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
        overflow: hidden;
        pointer-events: none;
        transition: opacity 500ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      #{{ status_element_id }}[data-state="hidden"],
      #{{ status_element_id }}:empty {
        opacity: 0;
      }

      #{{ status_element_id }}[data-state="error"] {
        border-color: rgba(255, 132, 132, 0.45);
        background: #2a0c10;
      }

      #pygodide-version {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 4;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: rgba(237, 243, 255, 0.42);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1;
        pointer-events: none;
        user-select: none;
        transition:
          opacity 150ms ease-out,
          visibility 150ms linear;
      }

      #pygodide-version[data-state="hidden"] {
        opacity: 0;
        visibility: hidden;
      }

      #{{ canvas_element_id }} {
        display: block;
        border: 1px solid rgba(140, 160, 220, 0.14);
        background: #050814;
        {% if canvas_auto %}
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        {% else %}
        width: min({{ canvas_width }}px, 100%);
        max-width: 100%;
        height: auto;
        {% endif %}
      }
    </style>
  </head>
  <body>
    <main class="pygodide-shell">
      <div class="pygodide-stage">
        <img
          id="pygodide-brand"
          src="{{ logo_path }}"
          width="326"
          height="102"
          alt="pygodide"
          data-state="active"
        />
        <div id="{{ status_element_id }}" data-state="active">{{ status_text }}</div>
        <p id="pygodide-version" data-state="active">pygodide {{ pygodide_version }}</p>
        <canvas
          id="{{ canvas_element_id }}"
          {% if canvas_auto %}
          data-canvas-auto="true"
          width="800"
          height="600"
          {% else %}
          width="{{ canvas_width }}"
          height="{{ canvas_height }}"
          {% endif %}
          tabindex="0"
        ></canvas>
      </div>
    </main>
    <script src="{{ pyodide_url }}"></script>
    {# Query string busts HTTP cache when boot.js content changes (Firefox keeps
       module scripts even when Storage is empty). #}
    <script type="module" src="{{ boot_script_path }}?v={{ boot_cache_buster }}"></script>
  </body>
</html>
