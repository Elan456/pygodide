<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        background: #090c17;
        color: #edf3ff;
      }

      .pygodide-shell {
        position: relative;
        width: max-content;
        max-width: 100vw;
        padding: 20px;
      }

      #{{ status_element_id }} {
        position: absolute;
        top: 32px;
        left: 32px;
        z-index: 2;
        max-width: min(420px, calc(100% - 64px));
        padding: 10px 12px;
        border: 1px solid rgba(165, 187, 255, 0.2);
        background: rgba(8, 12, 24, 0.82);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
        font-size: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      #{{ status_element_id }}[data-state="hidden"],
      #{{ status_element_id }}:empty {
        opacity: 0;
      }

      #{{ status_element_id }}[data-state="error"] {
        border-color: rgba(255, 132, 132, 0.35);
        background: rgba(42, 8, 12, 0.88);
      }

      #{{ canvas_element_id }} {
        display: block;
        max-width: calc(100vw - 40px);
        height: auto;
        border: 1px solid rgba(140, 160, 220, 0.14);
        background: #050814;
      }
    </style>
  </head>
  <body>
    <main class="pygodide-shell">
      <div id="{{ status_element_id }}" data-state="active">{{ status_text }}</div>
      <canvas
        id="{{ canvas_element_id }}"
        width="{{ canvas_width }}"
        height="{{ canvas_height }}"
        tabindex="0"
      ></canvas>
    </main>
    <script src="{{ pyodide_url }}"></script>
    <script type="module" src="{{ boot_script_path }}"></script>
  </body>
</html>
